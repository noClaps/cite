<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cite</title>
        <meta
            name="description"
            content="A tool to generate Hayagriva citations from DOI URLs"
        />
        <link rel="stylesheet" href="./style.css" />
        <script type="module" src="./script.ts"></script>
    </head>
    <body>
        <header>
            <h1>Cite</h1>
            <p>
                A tool to generate
                <a
                    target="_blank"
                    rel="noreferrer noopener"
                    href="https://github.com/typst/hayagriva"
                    >Hayagriva</a
                >
                citations from DOI URLs.
            </p>
        </header>
        <main>
            <input name="doi" type="text" placeholder="Enter DOI here" />
            <output></output>
            <button>Copy</button>
        </main>
    </body>
</html>
